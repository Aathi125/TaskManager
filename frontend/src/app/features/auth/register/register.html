<div class="login-wrapper">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="login-card card shadow-lg border-0 p-4 p-md-5">

      <!-- Brand -->
      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-3">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <h1 class="brand-title">Create Account</h1>
        <p class="text-muted small mb-0">Join TaskFlow and start managing your tasks</p>
      </div>

      <!-- Success Alert -->
      <div *ngIf="successMessage"
           class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3"
           role="alert">
        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage"
           class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3"
           role="alert">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Username -->
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group has-validation">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Choose a username"
              autocomplete="username"
              class="form-control border-start-0"
              [class.is-invalid]="isInvalid('username')"
            />
            <div class="invalid-feedback">
              <span *ngIf="registerForm.get('username')?.errors?.['required']">
                Username is required.
              </span>
              <span *ngIf="registerForm.get('username')?.errors?.['minlength']">
                At least 3 characters required.
              </span>
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group has-validation">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Create a password"
              autocomplete="new-password"
              class="form-control border-start-0 border-end-0"
              [class.is-invalid]="isInvalid('password')"
            />
            <button
              type="button"
              class="input-group-text bg-light border-start-0 toggle-pw"
              (click)="showPassword = !showPassword"
              tabindex="-1"
            >
              <i class="bi text-muted"
                 [class.bi-eye]="!showPassword"
                 [class.bi-eye-slash]="showPassword"></i>
            </button>
            <div class="invalid-feedback">
              <span *ngIf="registerForm.get('password')?.errors?.['required']">
                Password is required.
              </span>
              <span *ngIf="registerForm.get('password')?.errors?.['minlength']">
                At least 6 characters required.
              </span>
            </div>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
          <div class="input-group has-validation">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-shield-lock text-muted"></i>
            </span>
            <input
              id="confirmPassword"
              [type]="showConfirm ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="Repeat your password"
              autocomplete="new-password"
              class="form-control border-start-0 border-end-0"
              [class.is-invalid]="isInvalid('confirmPassword') ||
                (registerForm.errors?.['passwordMismatch'] &&
                 registerForm.get('confirmPassword')?.touched)"
            />
            <button
              type="button"
              class="input-group-text bg-light border-start-0 toggle-pw"
              (click)="showConfirm = !showConfirm"
              tabindex="-1"
            >
              <i class="bi text-muted"
                 [class.bi-eye]="!showConfirm"
                 [class.bi-eye-slash]="showConfirm"></i>
            </button>
            <div class="invalid-feedback">
              <span *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">
                Please confirm your password.
              </span>
              <span *ngIf="registerForm.errors?.['passwordMismatch'] &&
                           !registerForm.get('confirmPassword')?.errors?.['required']">
                Passwords do not match.
              </span>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="btn btn-primary w-100 py-2 fw-semibold submit-btn"
          [disabled]="loading"
        >
          <span *ngIf="loading"
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true">
          </span>
          <i *ngIf="!loading" class="bi bi-person-check me-2"></i>
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>

      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Already have an account?
        <a routerLink="/login" class="text-primary text-decoration-none fw-semibold">
          Sign In
        </a>
      </p>

    </div>
  </div>
</div>
